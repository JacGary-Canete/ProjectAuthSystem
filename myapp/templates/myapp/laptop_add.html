{% extends 'myapp/base.html' %}
{% block title %}Add Laptop — LapTrack{% endblock %}
{% block content %}
<div class="card">
    <div class="eyebrow">Inventory</div>
    <h2>Add New Laptop</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="message">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Add Laptop</button>
    </form>

    <div class="helper-text"><a href="{% url 'laptop_list' %}">← Back to inventory</a></div>
</div>
{% endblock %}
