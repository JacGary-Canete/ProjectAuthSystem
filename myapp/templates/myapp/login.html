{% extends 'myapp/base.html' %}
{% block title %}Login — LapTrack{% endblock %}
{% block content %}
<div class="card">
    <div class="eyebrow">LapTrack</div>
    <h2>Welcome back</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="message error">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <p>
            <label>Email or Username</label>
            <input type="text" name="username" required>
        </p>
        <p>
            <label>Password</label>
            <input type="password" name="password" required>
        </p>
        <button type="submit">Log in</button>
    </form>

    <div class="helper-text">Don't have an account? <a href="{% url 'register' %}">Register</a></div>
</div>
{% endblock %}
