{% extends 'myapp/base.html' %}
{% block title %}Reset Password — LapTrack{% endblock %}
{% block content %}
<div class="card">
    <div class="eyebrow">LapTrack</div>
    <h2>Reset your password</h2>
    <p style="color:var(--muted); font-size:13.5px; margin-bottom:20px;">Enter your email and we'll send you instructions to reset your password.</p>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Send reset link</button>
    </form>
    <div class="helper-text"><a href="{% url 'login' %}">← Back to login</a></div>
</div>
{% endblock %}
