{% extends 'myapp/base.html' %}
{% block title %}Set New Password — LapTrack{% endblock %}
{% block content %}
<div class="card">
    <div class="eyebrow">LapTrack</div>
    <h2>Set a new password</h2>
    {% if validlink %}
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Reset password</button>
    </form>
    {% else %}
    <p style="color:var(--error); font-size:14px;">This reset link is invalid or has expired.</p>
    <div class="helper-text"><a href="{% url 'password_reset' %}">Request a new link</a></div>
    {% endif %}
</div>
{% endblock %}
